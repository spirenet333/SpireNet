<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>spirenet</title>

<style>

body{
background:black;
color:#00ff9c;
font-family:Menlo,monospace;
font-size:18px;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

#terminal{
text-align:left;
}

.cursor{
display:inline-block;
width:10px;
background:#00ff9c;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

input{
display:none;
}

</style>
</head>

<body>

<div id="terminal">

<div>spirenet node awaiting key...</div>
<div>> <span class="cursor"></span></div>

</div>

<input type="file" id="keyfile">
<input type="file" id="sigfile">

<script>

document.addEventListener("keydown",function(e){

if(e.key==="Enter"){

document.getElementById("keyfile").click();

}

});

document.getElementById("keyfile").addEventListener("change",function(){

document.getElementById("sigfile").click();

});

document.getElementById("sigfile").addEventListener("change",verify);

function verify(){

const keyFile=document.getElementById("keyfile").files[0];
const sigFile=document.getElementById("sigfile").files[0];

const reader1=new FileReader();
const reader2=new FileReader();

reader1.onload=function(){

reader2.onload=function(){

const keyData=JSON.parse(reader1.result);
const signature=reader2.result.trim();

if(
keyData.system==="SpireNet" &&
keyData.key_id==="SPN-9F3A-2C81-7BD4-EE19-42A7" &&
signature==="SPN-SIGN-81A9-44F2-C11E-9920"
){

document.getElementById("terminal").innerHTML=
"access granted<br><br>initializing node...";

setTimeout(function(){
window.location.href="index.html";
},2000);

}else{

document.getElementById("terminal").innerHTML=
"invalid key";

}

};

reader2.readAsText(sigFile);

};

reader1.readAsText(keyFile);

}

</script>

</body>
</html>
