<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>spirenet</title>
<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
  color:#fff;
  font-family:menlo,monospace;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
#terminal{
  white-space:pre-wrap;
  font-size:16px;
  line-height:1.6;
}
.cursor{
  display:inline-block;
  width:10px;
  background:#fff;
  vertical-align:middle;
}
.hidden{ display:none; }
</style>
</head>
<body>

<div id="terminal">spirenet node awaiting key...

tap anywhere to continue
> <span class="cursor"></span></div>

<input id="keyfile" class="hidden" type="file" accept=".json,application/json">

<script>
const terminal = document.getElementById("terminal");
const keyfile = document.getElementById("keyfile");

function screen(text){
  terminal.innerHTML = text.replace(/\n/g,"<br>");
}

function fail(){
  sessionStorage.removeItem("spirenet_usb_verified");
  screen("invalid key\n\ntap anywhere to retry\n> <span class='cursor'></span>");
}

function success(){
  sessionStorage.setItem("spirenet_usb_verified","true");
  screen("access granted\ninitializing node...\n> <span class='cursor'></span>");
  setTimeout(()=>{ window.location.href="app.html"; }, 900);
}

// iOS requirement: file picker must be triggered by user gesture.
// so: first tap anywhere opens it immediately.
document.addEventListener("click", ()=> keyfile.click(), { once:false });
document.addEventListener("keydown", (e)=>{
  if(e.key === "Enter") keyfile.click();
});

keyfile.addEventListener("change", ()=>{
  const f = keyfile.files && keyfile.files[0];
  if(!f){ fail(); return; }

  const r = new FileReader();
  r.onload = ()=>{
    try{
      const k = JSON.parse(r.result);

      const ok =
        k.system === "SpireNet" &&
        k.key_id === "SPN-9F3A-2C81-7BD4-EE19-42A7" &&
        k.signature === "SPN-SIGN-81A9-44F2-C11E-9920";

      if(ok) success();
      else fail();

    }catch(err){
      fail();
    }
  };
  r.readAsText(f);
});

// optional: try to open picker after load (many iOS builds block this)
// so it won’t replace the tap, but it doesn’t hurt:
setTimeout(()=>{ try{ keyfile.click(); }catch(e){} }, 600);
</script>

</body>
</html>
