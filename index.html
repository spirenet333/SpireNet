<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>SpireNet_V17</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="screen-frame">
      <div id="boot-overlay" class="layer active">
        <div class="center-panel">
          <div class="brand">SPIRENET</div>
          <div class="subbrand">V17 SYSTEM INTERFACE</div>
          <div class="boot-line">Initializing shell...</div>
        </div>
      </div>

      <div id="usb-gate" class="layer hidden">
        <div class="center-panel">
          <div class="gate-title">USB KEY AUTHORIZATION REQUIRED</div>
          <div class="gate-text">
            Insert authorized key to continue.
          </div>
          <button id="usb-enter-btn" type="button">
            ENTER WITH KEY
          </button>
        </div>
      </div>

      <div id="terminal-view" class="layer hidden">
        <div id="terminal-header">
          <div class="terminal-title">SpireNet Command Interface</div>
          <div class="terminal-status">LINK STABLE</div>
        </div>

        <div id="terminal-output" aria-live="polite"></div>

        <form id="terminal-form" autocomplete="off">
          <label id="prompt-line" for="command-input">
            <span id="prompt-label">spire@v17:~$</span>
            <input
              id="command-input"
              name="command"
              type="text"
              spellcheck="false"
              autocapitalize="off"
              autocomplete="off"
              autofocus
            />
          </label>
        </form>
      </div>
    </div>
  </div>

  <script src="spirenet.js"></script>
</body>
</html>
