<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>spirenet</title>

<style>
html,body{
  margin:0;
  height:100%;
  background:black;
  color:white;
  font-family:Menlo, monospace;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

#terminal{
  white-space:pre-wrap;
  font-size:16px;
  line-height:1.6;
  text-align:left;
  max-width:700px;
}

.cursor{
  display:inline-block;
  width:10px;
  background:white;
  animation:blink 1s infinite;
  vertical-align:middle;
}

@keyframes blink{
  0%{opacity:0}
  50%{opacity:1}
  100%{opacity:0}
}

.hidden{
  display:none;
}
</style>
</head>
<body>

<div id="terminal">spirenet node awaiting key...

tap anywhere to begin
> <span class="cursor"></span></div>

<input id="fileInput" class="hidden" type="file">

<script>
const terminal = document.getElementById("terminal");
const fileInput = document.getElementById("fileInput");

let stage = 0;
let keyText = "";
let authText = "";
let sigText = "";

const WORKER_URL = "https://spirenet-auth.experimental-acs.workers.dev";

function screen(text){
  terminal.innerHTML = text.replace(/\n/g,"<br>") + "<br><span class='cursor'></span>";
}

function normalize(text){
  return (text || "").replace(/\r\n/g,"\n").trim();
}

function resetFlow(message){
  localStorage.removeItem("spirenet_usb_verified");
  localStorage.removeItem("spirenet_role");
  stage = 0;
  keyText = "";
  authText = "";
  sigText = "";
  fileInput.value = "";
  screen(
`spirenet node rejected

${message}

tap anywhere to retry
>`
  );
}

function success(role){
  localStorage.setItem("spirenet_usb_verified","true");
  localStorage.setItem("spirenet_role", role);

  screen(
`verifying node...

role accepted: ${role}

access granted
entering network...
>`
  );

  setTimeout(()=>{
    window.location.href = "app.html";
  },1200);
}

function updatePrompt(){
  if(stage === 0){
    screen(
`spirenet node awaiting key...

select node_key.txt
>`
    );
  }

  if(stage === 1){
    screen(
`node key accepted

select node_auth.txt
>`
    );
  }

  if(stage === 2){
    screen(
`authorization accepted

select node_sig.txt
>`
    );
  }
}

async function verifyWithWorker(){
  try{
    const res = await fetch(WORKER_URL, {
      method: "POST",
      mode: "cors",
      headers: {
        "content-type": "application/json"
      },
      body: JSON.stringify({
        key: keyText,
        auth: authText,
        sig: sigText
      })
    });

    const data = await res.json();

    if(data.status === "ok"){
      success(data.role || "operator");
    } else {
      resetFlow("authentication failed");
    }
  } catch (err){
    resetFlow("worker connection failed");
  }
}

updatePrompt();

document.addEventListener("click", ()=>{
  fileInput.click();
});

document.addEventListener("keydown", (e)=>{
  if(e.key === "Enter"){
    fileInput.click();
  }
});

fileInput.addEventListener("change", ()=>{
  const file = fileInput.files[0];

  if(!file){
    resetFlow("no file selected");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(){
    const text = normalize(reader.result);

    if(stage === 0){
      if(file.name === "node_key.txt"){
        keyText = text;
        stage = 1;
        fileInput.value = "";
        updatePrompt();
      } else {
        resetFlow("expected node_key.txt");
      }
      return;
    }

    if(stage === 1){
      if(file.name === "node_auth.txt"){
        authText = text;
        stage = 2;
        fileInput.value = "";
        updatePrompt();
      } else {
        resetFlow("expected node_auth.txt");
      }
      return;
    }

    if(stage === 2){
      if(file.name === "node_sig.txt"){
        sigText = text;
        screen(
`all node files received

contacting verification server...
>`
        );
        await verifyWithWorker();
      } else {
        resetFlow("expected node_sig.txt");
      }
      return;
    }
  };

  reader.readAsText(file);
});
</script>

</body>
</html>
